<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sab Vehle — Family Calendar</title>
<meta name="description" content="Birthdays and anniversaries for the Sab Vehle family"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#FDF6EE;
  --ivory:#F7EDE0;
  --terra:#C4522A;
  --terra-light:#FAECE7;
  --terra-dark:#8C3519;
  --saffron:#D4900A;
  --saffron-light:#FFF4DC;
  --green:#2E7D52;
  --green-light:#E6F5EE;
  --brown:#2D1B0E;
  --brown-mid:#7A5C45;
  --brown-light:#B89A80;
  --border:#E4CBAF;
  --card:#FFFFFF;
  --shadow:0 1px 3px rgba(45,27,14,.08);
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
  --radius:10px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--brown);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}

/* ── NOISE TEXTURE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.4}

/* ── HEADER ── */
header{position:relative;z-index:1;background:var(--brown);color:var(--cream);padding:2.5rem 1.5rem 2rem;text-align:center;overflow:hidden}
header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(196,82,42,.25) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 50%,rgba(212,144,10,.2) 0%,transparent 60%);pointer-events:none}
.header-ornament{font-size:22px;letter-spacing:12px;opacity:.4;margin-bottom:.5rem;display:block}
header h1{font-family:var(--font-display);font-size:clamp(2.2rem,6vw,3.5rem);font-weight:600;letter-spacing:-.01em;color:var(--ivory);line-height:1.1}
header h1 span{color:var(--saffron);font-style:italic}
header p{font-size:13px;color:var(--brown-light);letter-spacing:.08em;text-transform:uppercase;margin-top:.6rem;font-weight:500}
.header-dots{display:flex;justify-content:center;gap:6px;margin-top:1.2rem;opacity:.3}
.header-dots span{width:4px;height:4px;border-radius:50%;background:var(--saffron)}
.header-dots span:nth-child(3){width:20px;border-radius:2px}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* ── UPCOMING STRIP ── */
.upcoming-strip{background:var(--brown);border-radius:var(--radius-lg);padding:1.2rem 1.5rem;margin-bottom:2rem;display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap}
.upcoming-strip h3{font-family:var(--font-display);font-size:1.1rem;color:var(--saffron);font-style:italic;white-space:nowrap;padding-top:2px;flex-shrink:0}
.upcoming-events{display:flex;gap:10px;flex-wrap:wrap;flex:1}
.ue-pill{background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.15);border-radius:50px;padding:5px 13px;font-size:12px;color:var(--ivory);display:flex;align-items:center;gap:7px;white-space:nowrap}
.ue-pill .days{background:var(--terra);color:white;border-radius:50px;padding:1px 7px;font-size:10px;font-weight:600}
.ue-pill.today .days{background:var(--saffron);color:var(--brown)}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.cal-month{font-family:var(--font-display);font-size:1.85rem;font-weight:600;color:var(--brown);letter-spacing:-.01em}
.cal-month span{color:var(--terra);font-style:italic}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--brown-mid);transition:all .15s}
.nav-btn:hover{background:var(--terra);border-color:var(--terra);color:white}
.cal-legend{display:flex;gap:14px;margin-bottom:1rem;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brown-mid);font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-dot.b{background:var(--terra)}.leg-dot.a{background:var(--green)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{text-align:center;font-size:11px;font-weight:600;color:var(--brown-light);padding:6px 2px;text-transform:uppercase;letter-spacing:.05em}
.cal-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;min-height:58px;padding:5px 6px;cursor:default;transition:border-color .15s;position:relative}
.cal-cell:hover{border-color:var(--terra)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.today{border-color:var(--saffron);background:var(--saffron-light)}
.cal-cell.has-events{cursor:pointer}
.day-n{font-size:12px;font-weight:600;color:var(--brown-mid)}
.cal-cell.today .day-n{color:var(--saffron)}
.event-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.edot{width:6px;height:6px;border-radius:50%}
.edot.b{background:var(--terra)}.edot.a{background:var(--green)}
.cell-names{font-size:8.5px;color:var(--brown-mid);line-height:1.3;margin-top:2px;overflow:hidden;max-height:22px}

/* ── TOOLTIP / POPOVER ── */
.popover{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--brown);color:var(--ivory);border-radius:var(--radius);padding:.75rem 1rem;font-size:12px;z-index:100;width:180px;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none}
.popover::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:10px;height:5px;background:var(--brown);clip-path:polygon(50% 0%,0% 100%,100% 100%)}
.cal-cell:hover .popover{display:block}
.pop-event{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,.1)}
.pop-event:last-child{border-bottom:none}
.pop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:2rem 0 1.75rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1rem;text-align:center}
.stat-n{font-family:var(--font-display);font-size:2.4rem;font-weight:600;color:var(--terra);line-height:1}
.stat-l{font-size:11px;color:var(--brown-mid);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* ── LIST VIEW ── */
.list-toggle{display:flex;gap:8px;margin-bottom:1.5rem;margin-top:1.75rem}
.toggle-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--brown-mid);font-family:var(--font-body);transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.toggle-btn.active{background:var(--brown);border-color:var(--brown);color:white}
.section-head{font-family:var(--font-display);font-size:1.5rem;font-weight:600;color:var(--brown);margin-bottom:1rem;display:flex;align-items:baseline;gap:.5rem}
.section-head small{font-family:var(--font-body);font-size:12px;color:var(--brown-mid);font-weight:500}
.month-group{margin-bottom:1.75rem}
.month-label-list{font-size:11px;font-weight:700;color:var(--brown-light);text-transform:uppercase;letter-spacing:.1em;padding-bottom:.4rem;border-bottom:1px solid var(--border);margin-bottom:.75rem}
.ev-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);margin-bottom:6px;transition:border-color .15s}
.ev-row:hover{border-color:var(--terra)}
.ev-badge{min-width:46px;text-align:center;border-radius:8px;padding:4px 6px;flex-shrink:0}
.ev-badge.b{background:var(--terra-light);color:var(--terra-dark)}
.ev-badge.a{background:var(--green-light);color:var(--green)}
.ev-badge-d{font-size:18px;font-weight:700;font-family:var(--font-display);line-height:1}
.ev-badge-m{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.ev-name{font-weight:600;font-size:14px;color:var(--brown)}
.ev-type{font-size:11px;color:var(--brown-mid);margin-top:1px}
.ev-soon{margin-left:auto;font-size:11px;font-weight:700;color:var(--saffron);white-space:nowrap;background:var(--saffron-light);padding:2px 8px;border-radius:50px}

/* ── ADD FORM ── */
.add-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem 1.5rem;margin-top:2rem}
.add-section h2{font-family:var(--font-display);font-size:1.5rem;font-weight:600;color:var(--brown);margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:var(--brown-mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--brown);background:var(--cream);font-family:var(--font-body);transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--terra)}
.submit-btn{width:100%;padding:11px;background:var(--terra);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);letter-spacing:.03em;transition:background .15s;margin-top:4px}
.submit-btn:hover{background:var(--terra-dark)}
.form-note{font-size:12px;color:var(--brown-mid);margin-top:10px;text-align:center}
.success{display:none;background:var(--green-light);color:var(--green);border-radius:var(--radius);padding:8px 14px;font-size:13px;font-weight:600;text-align:center;margin-top:8px}

/* ── FOOTER ── */
footer{background:var(--brown);color:var(--brown-light);text-align:center;padding:2rem 1rem;font-size:12px;position:relative;z-index:1}
footer strong{color:var(--saffron);font-family:var(--font-display);font-size:14px;font-style:italic}
.export-link{display:inline-flex;align-items:center;gap:6px;margin-top:.75rem;color:var(--brown-light);font-size:12px;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.2);padding-bottom:1px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-body)}
.export-link:hover{color:var(--ivory)}

/* ── MOBILE ── */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .form-full{grid-column:1}
  .stats{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-n{font-size:1.8rem}
  .cal-cell{min-height:44px;padding:3px 4px}
  .cell-names{display:none}
  header h1{font-size:2rem}
  .upcoming-strip{padding:1rem}
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page > *{animation:fadeUp .4s ease both}
.page > *:nth-child(1){animation-delay:.05s}
.page > *:nth-child(2){animation-delay:.1s}
.page > *:nth-child(3){animation-delay:.15s}
.page > *:nth-child(4){animation-delay:.2s}
.page > *:nth-child(5){animation-delay:.25s}
</style>
</head>
<body>

<header>
  <span class="header-ornament">✦ ✦ ✦</span>
  <h1>Sab <span>Vehle</span></h1>
  <p>Family Birthdays &amp; Anniversaries</p>
  <div class="header-dots"><span></span><span></span><span></span><span></span><span></span></div>
</header>

<div class="page">

  <!-- UPCOMING STRIP -->
  <div class="upcoming-strip" id="upcomingStrip">
    <h3>Coming up</h3>
    <div class="upcoming-events" id="upcomingEvents"></div>
  </div>

  <!-- STATS -->
  <div class="stats" id="statsRow"></div>

  <!-- CALENDAR -->
  <div class="cal-nav">
    <div class="cal-month" id="calMonth"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">&#8592;</button>
      <button class="nav-btn" onclick="changeMonth(1)" aria-label="Next month">&#8594;</button>
    </div>
  </div>
  <div class="cal-legend">
    <div class="leg"><span class="leg-dot b"></span>Birthday</div>
    <div class="leg"><span class="leg-dot a"></span>Anniversary</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <!-- LIST VIEW -->
  <div class="list-toggle">
    <button class="toggle-btn active" onclick="setView('all')" id="btnAll">All</button>
    <button class="toggle-btn" onclick="setView('birthday')" id="btnB">Birthdays</button>
    <button class="toggle-btn" onclick="setView('anniversary')" id="btnA">Anniversaries</button>
  </div>
  <div id="listView"></div>

  <!-- ADD FORM -->
  <div class="add-section">
    <h2>Add an event</h2>
    <div class="form-grid">
      <div class="form-full">
        <label for="fName">Name(s)</label>
        <input id="fName" type="text" placeholder="e.g. Priya or Priya & Rohan"/>
      </div>
      <div>
        <label for="fType">Type</label>
        <select id="fType">
          <option value="birthday">🎂 Birthday</option>
          <option value="anniversary">💍 Anniversary</option>
        </select>
      </div>
      <div>
        <label for="fDay">Day</label>
        <input id="fDay" type="number" min="1" max="31" placeholder="1 – 31"/>
      </div>
      <div>
        <label for="fMonth">Month</label>
        <select id="fMonth">
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div class="form-full">
        <button class="submit-btn" onclick="addEvent()">+ Add to Calendar</button>
        <div class="success" id="successMsg">✓ Added successfully!</div>
        <p class="form-note">Events are saved in this browser. Export CSV to back them up.</p>
      </div>
    </div>
  </div>

</div>

<footer>
  <strong>Sab Vehle</strong>
  <br/>Family calendar · Updated May 2025
  <br/>
  <button class="export-link" onclick="exportCSV()">⬇ Download CSV backup</button>
</footer>

  {n:'Dipti & Angad',t:'anniversary',m:5,d:24},
  {n:'Rummy & Gursharan',t:'anniversary',m:6,d:21},
  {n:'Tanya & Jasmeet',t:'anniversary',m:6,d:25},
  {n:'Pankita & Aman',t:'anniversary',m:7,d:10},
  {n:'Priya & Erno',t:'anniversary',m:8,d:20},
  {n:'Sona & Paramjeet',t:'anniversary',m:9,d:4},
  {n:'Baby & Charan',t:'anniversary',m:10,d:10},
  {n:'Surinder & Deepa',t:'anniversary',m:10,d:25},
  {n:'Tikka & Baby',t:'anniversary',m:11,d:30},
  {n:'Priti & Simar',t:'anniversary',m:12,d:3},
  {n:'Nita & Birinder',t:'anniversary',m:12,d:7},
  {n:'Anjana & Kuku',t:'anniversary',m:12,d:7},
  {n:'Chitwan & Tapan',t:'anniversary',m:12,d:11},
  {n:'Gugu & Dolly',t:'anniversary',m:12,d:12},
  {n:'Avtar & Vimmy',t:'anniversary',m:12,d:29},
];

const STORAGE_KEY='sabvehle_extra_v1';
let curMonth,curYear,allEvents=[],curView='all';
const today=new Date();

function loadEvents(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    const extra=raw?JSON.parse(raw):[];
    allEvents=[...SEED,...extra];
  }catch(e){allEvents=[...SEED];}
}

function daysUntil(m,d){
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let nx=new Date(now.getFullYear(),m-1,d);
  if(nx<base)nx=new Date(now.getFullYear()+1,m-1,d);
  return Math.round((nx-base)/86400000);
}

function eventsOnDay(m,d){return allEvents.filter(e=>e.m===m+1&&e.d===d);}

function renderUpcoming(){
  const sorted=allEvents
    .map(e=>({...e,days:daysUntil(e.m,e.d)}))
    .sort((a,b)=>a.days-b.days)
    .slice(0,8);
  document.getElementById('upcomingEvents').innerHTML=sorted.map(e=>{
    const label=e.days===0?'Today':e.days===1?'Tomorrow':`${e.days}d`;
    const isTd=e.days===0;
    return `<div class="ue-pill${isTd?' today':''}">
      ${e.n} <span class="days">${label}</span>
    </div>`;
  }).join('');
}

function renderStats(){
  const bdays=allEvents.filter(e=>e.t==='birthday').length;
  const annivs=allEvents.filter(e=>e.t==='anniversary').length;
  const thisM=allEvents.filter(e=>e.m===curMonth+1).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-n">${bdays}</div><div class="stat-l">Birthdays</div></div>
    <div class="stat"><div class="stat-n">${annivs}</div><div class="stat-l">Anniversaries</div></div>
    <div class="stat"><div class="stat-n">${thisM}</div><div class="stat-l">This Month</div></div>`;
}

function renderCalendar(){
  document.getElementById('calMonth').innerHTML=
    `${MONTHS[curMonth]} <span>${curYear}</span>`;
  const g=document.getElementById('calGrid');
  g.innerHTML=DAYS_SHORT.map(d=>`<div class="cal-head">${d}</div>`).join('');
  const first=new Date(curYear,curMonth,1).getDay();
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<first;i++)g.innerHTML+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const evs=eventsOnDay(curMonth,d);
    const isToday=d===today.getDate()&&curMonth===today.getMonth()&&curYear===today.getFullYear();
    const hasBday=evs.some(e=>e.t==='birthday');
    const hasAnniv=evs.some(e=>e.t==='anniversary');
    const popContent=evs.map(e=>`<div class="pop-event">
      <span class="pop-dot" style="background:${e.t==='birthday'?'#C4522A':'#2E7D52'}"></span>
      <span>${e.n}</span></div>`).join('');
    g.innerHTML+=`<div class="cal-cell${isToday?' today':''}${evs.length?' has-events':''}">
      <div class="day-n">${d}</div>
      ${evs.length?`<div class="event-dots">
        ${hasBday?'<span class="edot b"></span>':''}
        ${hasAnniv?'<span class="edot a"></span>':''}
      </div>
      <div class="cell-names">${evs.map(e=>e.n.split(' ')[0]).join(', ')}</div>
      <div class="popover">${popContent}</div>`:''}
    </div>`;
  }
}

function renderList(){
  const filtered=curView==='all'?allEvents:allEvents.filter(e=>e.t===curView);
  const byMonth={};
  filtered.forEach(e=>{
    if(!byMonth[e.m])byMonth[e.m]=[];
    byMonth[e.m].push(e);
  });
  const keys=Object.keys(byMonth).map(Number).sort((a,b)=>a-b);
  document.getElementById('listView').innerHTML=keys.map(m=>{
    const evs=byMonth[m].sort((a,b)=>a.d-b.d);
    return `<div class="month-group">
      <div class="month-label-list">${MONTHS[m-1]}</div>
      ${evs.map(e=>{
        const days=daysUntil(e.m,e.d);
        const soon=days<=30;
        const label=days===0?'Today':days===1?'Tomorrow':days<=30?`In ${days}d`:'';
        return `<div class="ev-row">
          <div class="ev-badge ${e.t==='birthday'?'b':'a'}">
            <div class="ev-badge-d">${e.d}</div>
            <div class="ev-badge-m">${MONTHS[e.m-1].slice(0,3)}</div>
          </div>
          <div>
            <div class="ev-name">${e.n}</div>
            <div class="ev-type">${e.t==='birthday'?'Birthday':'Anniversary'}</div>
          </div>
          ${soon&&label?`<div class="ev-soon">${label}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function setView(v){
  curView=v;
  document.getElementById('btnAll').classList.toggle('active',v==='all');
  document.getElementById('btnB').classList.toggle('active',v==='birthday');
  document.getElementById('btnA').classList.toggle('active',v==='anniversary');
  renderList();
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
  renderStats();
}

function addEvent(){
  const name=document.getElementById('fName').value.trim();
  const type=document.getElementById('fType').value;
  const day=parseInt(document.getElementById('fDay').value);
  const month=parseInt(document.getElementById('fMonth').value);
  if(!name||isNaN(day)||day<1||day>31){
    alert('Please enter a name and a valid day (1–31).');return;
  }
  const ev={n:name,t:type,m:month,d:day};
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    const extra=raw?JSON.parse(raw):[];
    extra.push(ev);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(extra));
  }catch(e){}
  allEvents.push(ev);
  document.getElementById('fName').value='';
  document.getElementById('fDay').value='';
  const msg=document.getElementById('successMsg');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2500);
  renderAll();
}

function exportCSV(){
  const rows=[['Name','Type','Month','Day']];
  allEvents.forEach(e=>rows.push([e.n,e.t,MONTHS[e.m-1],e.d]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='SabVehle_FamilyCalendar.csv';
  a.click();
}

function renderAll(){
  renderUpcoming();
  renderStats();
  renderCalendar();
  renderList();
}

curMonth=today.getMonth();
curYear=today.getFullYear();
loadEvents();
renderAll();
</script>
</body>
