<style>
:root{
  --cream:#FDF6EE;--ivory:#F7EDE0;
  --terra:#C4522A;--terra-light:#FAECE7;--terra-dark:#8C3519;
  --saffron:#D4900A;--saffron-light:#FFF4DC;
  --green:#2E7D52;--green-light:#E6F5EE;
  --brown:#2D1B0E;--brown-mid:#7A5C45;--brown-light:#B89A80;
  --border:#E4CBAF;--card:#FFFFFF;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--brown);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}

/* ── HEADER ── */
header{position:relative;overflow:hidden;min-height:220px;display:flex;align-items:center;justify-content:center}
.header-bg{position:absolute;inset:0;background-size:cover;background-position:center 40%;filter:brightness(.38) saturate(1.1)}
.header-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,8,2,.3) 0%,rgba(45,27,14,.75) 100%)}
.header-content{position:relative;z-index:2;text-align:center;padding:2.5rem 1.5rem 2rem}
.header-ornament{font-size:18px;letter-spacing:14px;opacity:.5;margin-bottom:.75rem;display:block;color:var(--saffron)}
header h1{font-family:var(--font-display);font-size:clamp(1.8rem,5.5vw,3.2rem);font-weight:600;color:var(--ivory);line-height:1.2;letter-spacing:-.01em}
header h1 em{color:var(--saffron);font-style:italic}
header p{font-size:12px;color:rgba(253,246,238,.6);letter-spacing:.12em;text-transform:uppercase;margin-top:.75rem;font-weight:500}
.header-rule{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:1.1rem;opacity:.45}
.header-rule span{width:30px;height:1px;background:var(--saffron)}
.header-rule i{width:5px;height:5px;border-radius:50%;background:var(--saffron)}

/* ── PAGE ── */
.page{max-width:920px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* ── UPCOMING STRIP ── */
.upcoming-strip{background:var(--brown);border-radius:var(--radius-lg);padding:1.1rem 1.4rem;margin-bottom:2rem;display:flex;gap:1.25rem;align-items:flex-start;flex-wrap:wrap}
.upcoming-strip h3{font-family:var(--font-display);font-size:1.05rem;color:var(--saffron);font-style:italic;white-space:nowrap;padding-top:3px;flex-shrink:0}
.upcoming-events{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.ue-pill{background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.15);border-radius:50px;padding:4px 12px;font-size:12px;color:var(--ivory);display:flex;align-items:center;gap:7px;white-space:nowrap}
.ue-pill .days{background:var(--terra);color:white;border-radius:50px;padding:1px 7px;font-size:10px;font-weight:600}
.ue-pill.today .days{background:var(--saffron);color:var(--brown)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;text-align:center}
.stat-n{font-family:var(--font-display);font-size:2.2rem;font-weight:600;color:var(--terra);line-height:1}
.stat-l{font-size:11px;color:var(--brown-mid);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.cal-month{font-family:var(--font-display);font-size:1.75rem;font-weight:600;color:var(--brown)}
.cal-month span{color:var(--terra);font-style:italic}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--brown-mid);transition:all .15s}
.nav-btn:hover{background:var(--terra);border-color:var(--terra);color:white}
.cal-legend{display:flex;gap:14px;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brown-mid);font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-dot.b{background:var(--terra)}.leg-dot.a{background:var(--green)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:2rem}
.cal-head{text-align:center;font-size:11px;font-weight:600;color:var(--brown-light);padding:5px 2px;text-transform:uppercase;letter-spacing:.05em}
.cal-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;min-height:56px;padding:5px 6px;position:relative}
.cal-cell:hover{border-color:var(--terra)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.today{border-color:var(--saffron);background:var(--saffron-light)}
.day-n{font-size:12px;font-weight:600;color:var(--brown-mid)}
.cal-cell.today .day-n{color:var(--saffron)}
.event-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.edot{width:6px;height:6px;border-radius:50%}
.edot.b{background:var(--terra)}.edot.a{background:var(--green)}
.cell-names{font-size:8.5px;color:var(--brown-mid);line-height:1.3;margin-top:2px;overflow:hidden;max-height:22px}
.popover{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--brown);color:var(--ivory);border-radius:var(--radius);padding:.7rem .9rem;font-size:12px;z-index:100;width:175px;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none}
.popover::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:5px solid var(--brown)}
.cal-cell:hover .popover{display:block}
.pop-ev{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,.1)}
.pop-ev:last-child{border-bottom:none}
.pop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── TABLE ── */
.section-title{font-family:var(--font-display);font-size:1.7rem;font-weight:600;color:var(--brown);margin:2rem 0 1rem;display:flex;align-items:baseline;gap:.5rem}
.section-title small{font-family:var(--font-body);font-size:12px;color:var(--brown-light);font-weight:500}
.events-table{width:100%;border-collapse:collapse;margin-bottom:2.5rem;font-size:13px}
.events-table th{background:var(--brown);color:var(--ivory);padding:9px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.07em}
.events-table th:first-child{width:52px;text-align:center;border-radius:8px 0 0 0}
.events-table th:last-child{border-radius:0 8px 0 0}
.events-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.events-table td:first-child{text-align:center;font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--brown-mid);white-space:nowrap;width:52px}
.events-table tr:hover td{background:var(--ivory)}
.month-row td{background:var(--ivory);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--brown-mid);padding:6px 12px;border-bottom:1px solid var(--border)}
.bday-cell{color:var(--terra-dark)}
.anniv-cell{color:var(--green)}
.bday-tag{display:inline-block;background:var(--terra-light);color:var(--terra-dark);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:600;margin:1px 2px}
.anniv-tag{display:inline-block;background:var(--green-light);color:var(--green);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:600;margin:1px 2px}
.empty-cell{color:var(--brown-light);font-size:12px;font-style:italic}

/* ── ADD FORM ── */
.add-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem 1.5rem;margin-top:1rem}
.add-section h2{font-family:var(--font-display);font-size:1.5rem;font-weight:600;color:var(--brown);margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:var(--brown-mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--brown);background:var(--cream);font-family:var(--font-body);-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--terra)}
.submit-btn{width:100%;padding:11px;background:var(--terra);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:background .15s;margin-top:4px}
.submit-btn:hover{background:var(--terra-dark)}
.form-desc{font-size:13px;color:var(--brown-mid);margin-bottom:1.25rem;margin-top:-.5rem}
.form-status{min-height:36px;margin-top:8px;font-size:13px;font-weight:600;text-align:center;border-radius:var(--radius);padding:0;transition:all .3s}
.form-status.success{background:var(--green-light);color:var(--green);padding:8px 14px}
.form-status.error{background:#FAECE7;color:var(--terra-dark);padding:8px 14px}
.form-status.sending{color:var(--brown-mid);padding:8px 0}

/* ── FOOTER ── */
footer{background:var(--brown);color:var(--brown-light);text-align:center;padding:2rem 1rem;font-size:12px}
footer strong{color:var(--saffron);font-family:var(--font-display);font-size:15px;font-style:italic}
.export-link{display:inline-flex;align-items:center;gap:6px;margin-top:.75rem;color:var(--brown-light);font-size:12px;cursor:pointer;background:none;border:none;font-family:var(--font-body);text-decoration:underline;text-underline-offset:3px}
.export-link:hover{color:var(--ivory)}

/* ── LOADING ── */
.loading{text-align:center;padding:2rem;color:var(--brown-mid);font-size:13px;font-style:italic}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}.form-full{grid-column:1}
  .stats{gap:8px}.stat-n{font-size:1.7rem}
  .cal-cell{min-height:44px;padding:3px 4px}.cell-names{display:none}
  header h1{font-size:1.6rem}
  .upcoming-strip{padding:1rem}
  .events-table td:first-child{font-size:1rem}
}

</head>

function parseCSV(text){
  const lines=text.trim().split('\n').slice(1);
  return lines.map(l=>{
    const cols=l.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
    const [name,type,monthStr,day]=cols;
    const m=MONTHS.indexOf(monthStr)+1;
    if(!name||!type||m<1||!day)return null;
    return{n:name,t:type.toLowerCase(),m,d:parseInt(day)};
  }).filter(Boolean);
}

    try{
      const res=await fetch(SHEET_CSV_URL);
      if(res.ok){const text=await res.text();base=parseCSV(text);}
    }catch(e){console.log('Sheet fetch failed, using seed data');}
  }
  let extra=[];
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)extra=JSON.parse(raw);}catch(e){}
  allEvents=[...base,...extra];
}

function daysUntil(m,d){
  const base=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  let nx=new Date(today.getFullYear(),m-1,d);
  if(nx<base)nx=new Date(today.getFullYear()+1,m-1,d);
  return Math.round((nx-base)/86400000);
}

function renderUpcoming(){
  const sorted=allEvents.map(e=>({...e,days:daysUntil(e.m,e.d)})).sort((a,b)=>a.days-b.days).slice(0,8);
  document.getElementById('upcomingEvents').innerHTML=sorted.map(e=>{
    const l=e.days===0?'Today':e.days===1?'Tomorrow':`${e.days}d`;
    return`<div class="ue-pill${e.days===0?' today':''}">${e.n}<span class="days">${l}</span></div>`;
  }).join('');
}

function renderStats(){
  const b=allEvents.filter(e=>e.t==='birthday').length;
  const a=allEvents.filter(e=>e.t==='anniversary').length;
  const m=allEvents.filter(e=>e.m===curMonth+1).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-n">${b}</div><div class="stat-l">Birthdays</div></div>
    <div class="stat"><div class="stat-n">${a}</div><div class="stat-l">Anniversaries</div></div>
    <div class="stat"><div class="stat-n">${m}</div><div class="stat-l">This Month</div></div>`;
  document.getElementById('eventCountLabel').textContent=`${b+a} events`;
}

function renderCalendar(){
  document.getElementById('calMonth').innerHTML=`${MONTHS[curMonth]} <span>${curYear}</span>`;
  const g=document.getElementById('calGrid');
  g.innerHTML=DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('');
  const first=new Date(curYear,curMonth,1).getDay();
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<first;i++)g.innerHTML+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const evs=allEvents.filter(e=>e.m===curMonth+1&&e.d===d);
    const isT=d===today.getDate()&&curMonth===today.getMonth()&&curYear===today.getFullYear();
    const hb=evs.some(e=>e.t==='birthday'),ha=evs.some(e=>e.t==='anniversary');
    const pop=evs.map(e=>`<div class="pop-ev"><span class="pop-dot" style="background:${e.t==='birthday'?'#C4522A':'#2E7D52'}"></span>${e.n}</div>`).join('');
    g.innerHTML+=`<div class="cal-cell${isT?' today':''}">
      <div class="day-n">${d}</div>
      ${evs.length?`<div class="event-dots">${hb?'<span class="edot b"></span>':''}${ha?'<span class="edot a"></span>':''}</div>
      <div class="cell-names">${evs.map(e=>e.n.split(' ')[0]).join(', ')}</div>
      <div class="popover">${pop}</div>`:''}
    </div>`;
  }
}

function renderTable(){
  const byMonth={};
  allEvents.forEach(e=>{
    if(!byMonth[e.m])byMonth[e.m]={};
    if(!byMonth[e.m][e.d])byMonth[e.m][e.d]={b:[],a:[]};
    e.t==='birthday'?byMonth[e.m][e.d].b.push(e.n):byMonth[e.m][e.d].a.push(e.n);
  });
  let html=`<table class="events-table"><thead><tr>
    <th>Day</th><th>Birthdays 🎂</th><th>Anniversaries 💍</th>
  </tr></thead><tbody>`;
  for(let m=1;m<=12;m++){
    if(!byMonth[m])continue;
    html+=`<tr class="month-row"><td colspan="3">${MONTHS[m-1]}</td></tr>`;
    const days=Object.keys(byMonth[m]).map(Number).sort((a,b)=>a-b);
    for(const d of days){
      const{b,a}=byMonth[m][d];
      const bHtml=b.length?b.map(n=>`<span class="bday-tag">${n}</span>`).join(''):'<span class="empty-cell">—</span>';
      const aHtml=a.length?a.map(n=>`<span class="anniv-tag">${n}</span>`).join(''):'<span class="empty-cell">—</span>';
      html+=`<tr><td>${d}</td><td>${bHtml}</td><td>${aHtml}</td></tr>`;
    }
  }
  html+=`</tbody></table>`;
  document.getElementById('tableView').innerHTML=html;
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();renderStats();
}

async function submitToSheet(){
  const name=document.getElementById('fName').value.trim();
  const type=document.getElementById('fType').value;
  const day=parseInt(document.getElementById('fDay').value);
  const month=parseInt(document.getElementById('fMonth').value);
  const status=document.getElementById('formStatus');
  const btn=document.getElementById('submitBtn');
  if(!name||isNaN(day)||day<1||day>31){
    status.className='form-status error';status.textContent='Please enter a name and a valid day (1–31).';return;
  }
  if(!SCRIPT_URL){
    status.className='form-status error';status.textContent='Submission not configured yet. Please ask the admin to set up the form.';return;
  }
  btn.disabled=true;status.className='form-status sending';status.textContent='Sending…';
  try{
    const params=new URLSearchParams({name,type,month:MONTHS[month-1],day});
    await fetch(SCRIPT_URL+'?'+params.toString(),{method:'GET',mode:'no-cors'});
    status.className='form-status success';status.textContent='✓ Sent! Your details will appear on the calendar shortly.';
    document.getElementById('fName').value='';document.getElementById('fDay').value='';
  }catch(e){
    status.className='form-status error';status.textContent='Something went wrong. Please try again.';
  }
  btn.disabled=false;
}

function exportCSV(){
  const rows=[['Name','Type','Month','Day']];
  allEvents.forEach(e=>rows.push([e.n,e.t,MONTHS[e.m-1],e.d]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='SabVehle_FamilyCalendar.csv';a.click();
}

function renderAll(){
  renderUpcoming();renderStats();renderCalendar();renderTable();
}

curMonth=today.getMonth();curYear=today.getFullYear();
loadEvents().then(renderAll);
</script>
